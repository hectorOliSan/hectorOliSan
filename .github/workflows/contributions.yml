name: Update contribution graph

# Re-scrapes the public contribution graph and re-renders contrib-heatmap.svg
# every day. No PAT / no secrets: the scraper hits GitHub's public endpoint and
# the commit is pushed with the built-in GITHUB_TOKEN.
# Requires: Settings -> Actions -> General -> Workflow permissions -> Read and write.

on:
  schedule: # execute every 12 hours
    - cron: "30 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r src/scripts/requirements.txt

      - name: Scrape contributions
        env:
          GH_PROFILE_USER: hectorOliSan
        run: python src/scripts/fetch_contributions.py

      - name: Render heatmap
        run: python src/scripts/render_heatmap_svg.py

      - name: Commit updated graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/contrib-heatmap.svg src/data/contributions.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh contribution graph [skip ci]"
            git push
          fi
